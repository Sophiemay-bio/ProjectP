{% extends "base.html" %}

{% block extrahead %}
<!-- Structured Data for Organization -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "PHLYXR",
  "description": "A New Era of Sexual Health, Revolutionary STI-preventing sexual contraceptive lubricant",
  "url": "https://phlyxr.com",
  "logo": "https://phlyxr.com/assets/logo.png",
  "foundingDate": "2025",
  "founders": [
    {
      "@type": "Person",
      "name": "Sophie Stephens",
      "jobTitle": "Biomedical Scientist"
    },
    {
      "@type": "Person",
      "name": "James Warren",
      "jobTitle": "Biomaterial Engineering Scientist"
    }
  ],
  "sameAs": [
    "https://www.instagram.com/phlyxr/",
    "https://www.linkedin.com/company/phlyxr/"
  ],
  "address": {
    "@type": "PostalAddress",
    "addressCountry": "GB"
  }
}
</script>

<!-- Structured Data for Product -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Product",
  "name": "PHLYXR",
  "description": "STI-preventing sexual lubricant with microbiome-friendly formula",
  "brand": {
    "@type": "Brand",
    "name": "PHLYXR"
  },
  "category": "Sexual Health",
  "releaseDate": "2027-10-01",
  "offers": {
    "@type": "Offer",
    "availability": "https://schema.org/PreOrder",
    "url": "https://phlyxr.com"
  }
}
</script>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-BNNHEYGKJP"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-BNNHEYGKJP');
</script>

<!-- Open Graph Meta Tags -->
<meta property="og:site_name" content="PHLYXR">
<meta property="og:type" content="website">
<meta property="og:title" content="{{ page.title | default(config.site_name, true) }}">
<meta property="og:description" content="{{ page.meta.description | default(config.site_description, true) }}">
<meta property="og:url" content="{{ page.canonical_url }}">
<meta property="og:image" content="{{ config.site_url }}/assets/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">

<!-- Twitter Card Meta Tags -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ page.title | default(config.site_name, true) }}">
<meta name="twitter:description" content="{{ page.meta.description | default(config.site_description, true) }}">
<meta name="twitter:image" content="{{ config.site_url }}/assets/og-image.png">

<!-- Additional SEO Meta Tags -->
<meta name="keywords" content="{{ page.meta.keywords | default('STI prevention, sexual lubricant, sexual health, microbiome friendly, non-hormonal contraceptive', true) }}">
<meta name="author" content="PHLYXR Team">
<meta name="robots" content="index, follow">
<link rel="canonical" href="{{ page.canonical_url }}">
{% endblock %}

{% block announce %}
<div class="md-banner">
  <div class="md-banner__inner md-grid md-typeset">
    <span>✨ <strong>PHLYXR is in development.</strong></span>
    <span>Join the mailing list or take our 5 minute survey.</span>
    <a class="announce-cta-inline primary" href="https://forms.gle/3UL5G6cJibZKnsHC7" target="_blank" rel="noopener">Mailing list</a>
    <a class="announce-cta-inline primary" href="https://forms.gle/5mRht5skMUeueyKU8" target="_blank" rel="noopener">Survey</a>
  </div>
</div>
{% endblock %}
